"$schema" = 'https://starship.rs/config-schema.json'

add_newline = true
continuation_prompt = "❯❯ "

format = "$username$hostname$directory$git_branch$git_status$cmd_duration$character"

right_format = """$python$nodejs$rust$golang$java$time"""

[character]
format = "$symbol "
success_symbol = "[❯](bold green)"
error_symbol = "[❯](bold red)"
vimcmd_symbol = "[❮](bold green)"

[directory]
truncation_length = 3
truncation_symbol = "…/"
home_symbol = "~"
style = "bold blue"
format = "[$path]($style)[$read_only]($read_only_style) "
read_only = " ro"
repo_root_style = "bold blue"
repo_root_format = "[$before_root_path]($before_repo_root_style)[$repo_root]($repo_root_style)[$path]($style)[$read_only]($read_only_style) "

[git_branch]
format = "[$branch]($style) "
symbol = ""
style = "purple"
truncation_symbol = "…"
truncation_length = 20
ignore_branches = []
only_attached = false

[git_status]
style = "red"
format = "[$all_status$ahead_behind]($style) "
conflicted = "!"
ahead = "⇡${count}"
behind = "⇣${count}"
diverged = "⇡${ahead_count}⇣${behind_count}"
untracked = "?"
stashed = "s"
modified = "*"
staged = "+"
renamed = ""
deleted = "-"

[git_metrics]
disabled = true

[cmd_duration]
format = "[$duration]($style) "
style = "yellow"
min_time = 2000

[username]
style_user = "bold yellow"
style_root = "bold red"
format = "[$user]($style)@"
show_always = false

[hostname]
format = "[$hostname]($style) "
style = "bold green"
ssh_only = true

[localip]
ssh_only = true
format = "[$localipv4]($style) "
style = "bold magenta"
disabled = false

[time]
disabled = false
format = " [$time]($style)"
time_format = "%H:%M"
style = "dimmed white"

[battery]
format = "[$percentage$symbol]($style) "
full_symbol = ""
charging_symbol = "+"
discharging_symbol = "-"
unknown_symbol = "?"
empty_symbol = "!"

[[battery.display]]
threshold = 20
style = "bold red"

[[battery.display]]
threshold = 60
style = "dimmed yellow"

[python]
format = " [py $version]($style)"
version_format = "${raw}"
style = "yellow"
symbol = ""

[nodejs]
format = " [node $version]($style)"
version_format = "${raw}"
style = "bold green"
symbol = ""
detect_files = ["package-lock.json", "yarn.lock"]
detect_folders = ["node_modules"]
detect_extensions = []

[rust]
format = " [rs $version]($style)"
version_format = "${raw}"
style = "bold red"
symbol = ""

[golang]
format = " [go $version]($style)"
version_format = "${raw}"
symbol = ""

[java]
format = " [java $version]($style)"
version_format = "${raw}"
symbol = ""

[lua]
format = " [lua $version]($style)"
version_format = "${raw}"
symbol = ""
style = "bold blue"

[deno]
format = " [deno $version]($style)"
version_format = "${raw}"
symbol = ""

[ruby]
format = " [rb $version]($style)"
version_format = "${raw}"
symbol = ""
style = "bold red"

[swift]
format = " [sw $version]($style)"
version_format = "${raw}"
symbol = ""
style = "bold red"

[package]
format = " [pkg $version]($style)"
version_format = "${raw}"
symbol = ""
style = "dimmed yellow"

[sudo]
format = "[sudo]($style) "
style = "bold red"
symbol = ""
disabled = false

[jobs]
format = "[$number]($style) "
style = "bold blue"
symbol = ""

[nix_shell]
style = "bold blue"
symbol = ""
format = "[nix $state]($style) [$name](dimmed white) "
impure_msg = "impure"
pure_msg = "pure"
unknown_msg = "?"

[conda]
symbol = ""
format = " [conda $environment]($style)"

[docker_context]
symbol = ""
format = " [docker $context]($style)"

[aws]
disabled = true

[memory_usage]
disabled = true
